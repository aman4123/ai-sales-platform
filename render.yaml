services:
  - type: web
    name: ai-sales-platform
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health/ready
    maxShutdownDelaySeconds: 30
    preDeployCommand: node node_modules/prisma/build/index.js migrate deploy
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: SERVE_STATIC
        value: "true"
      - key: TRUST_PROXY
        value: 1
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: ai-sales-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-sales-redis
          property: connectionString
      - key: DATABASE_POOL_MAX
        value: 10
      - key: DATABASE_POOL_IDLE_TIMEOUT_MS
        value: 30000
      - key: DATABASE_POOL_CONNECTION_TIMEOUT_MS
        value: 5000
      - key: DATABASE_STATEMENT_TIMEOUT_MS
        value: 30000
      - key: REDIS_CONNECT_TIMEOUT_MS
        value: 5000
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: ai-sales-platform
      - key: JWT_AUDIENCE
        value: ai-sales-platform-web
      - key: JWT_ACCESS_TTL_SECONDS
        value: 900
      - key: JWT_REFRESH_TTL_SECONDS
        value: 604800
      - key: BCRYPT_ROUNDS
        value: 12
      - key: APP_BASE_URL
        sync: false
      - key: EMAIL_DELIVERY_MODE
        value: smtp
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_VERIFICATION_TTL_MINUTES
        value: 1440
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 60
      - key: RECOVERY_CODE_COUNT
        value: 8
      - key: METRICS_AUTH_TOKEN
        generateValue: true
      - key: CORS_ORIGINS
        value: ""
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: AUTH_RATE_LIMIT_MAX
        value: 10
      - key: AI_RATE_LIMIT_WINDOW_MS
        value: 3600000
      - key: AI_RATE_LIMIT_MAX
        value: 20
      - key: AI_REQUEST_TIMEOUT_MS
        value: 30000
      - key: AI_RESPONSE_MAX_BYTES
        value: 262144
      - key: AI_MAX_TOKENS
        value: 1500
      - key: AI_HISTORY_RETENTION_DAYS
        value: 90
      - key: MAINTENANCE_INTERVAL_MS
        value: 21600000

  - type: keyvalue
    name: ai-sales-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off

databases:
  - name: ai-sales-postgres
    plan: basic-256mb
    databaseName: ai_sales
    user: ai_sales
    postgresMajorVersion: "17"
    ipAllowList: []
