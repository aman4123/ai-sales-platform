# Zero-cost early-launch Blueprint. It intentionally creates only one Render Free web service.
services:
  - type: web
    name: ai-sales-platform-free
    runtime: docker
    plan: free
    branch: feature/free-tier-deployment
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh -c "node node_modules/prisma/build/index.js migrate deploy && node server/dist/index.js"
    healthCheckPath: /api/health/ready
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: SERVE_STATIC
        value: "true"
      - key: TRUST_PROXY
        value: 1
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: DATABASE_POOL_MAX
        value: 5
      - key: DATABASE_POOL_IDLE_TIMEOUT_MS
        value: 30000
      - key: DATABASE_POOL_CONNECTION_TIMEOUT_MS
        value: 10000
      - key: DATABASE_STATEMENT_TIMEOUT_MS
        value: 30000
      - key: REDIS_URL
        sync: false
      - key: REDIS_CONNECT_TIMEOUT_MS
        value: 5000
      - key: REDIS_CONNECT_RETRIES
        value: 5
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: ai-sales-platform
      - key: JWT_AUDIENCE
        value: ai-sales-platform-web
      - key: JWT_ACCESS_TTL_SECONDS
        value: 900
      - key: JWT_REFRESH_TTL_SECONDS
        value: 604800
      - key: BCRYPT_ROUNDS
        value: 12
      - key: APP_BASE_URL
        sync: false
      - key: EMAIL_DELIVERY_MODE
        value: resend
      - key: EMAIL_FROM
        value: onboarding@resend.dev
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_REQUEST_TIMEOUT_MS
        value: 10000
      - key: EMAIL_VERIFICATION_TTL_MINUTES
        value: 1440
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 60
      - key: RECOVERY_CODE_COUNT
        value: 8
      - key: METRICS_AUTH_TOKEN
        generateValue: true
      - key: CORS_ORIGINS
        value: ""
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: AUTH_RATE_LIMIT_MAX
        value: 10
      - key: AI_RATE_LIMIT_WINDOW_MS
        value: 3600000
      - key: AI_RATE_LIMIT_MAX
        value: 10
      - key: AI_REQUEST_TIMEOUT_MS
        value: 15000
      - key: AI_RESPONSE_MAX_BYTES
        value: 131072
      - key: AI_MAX_TOKENS
        value: 800
      - key: AI_MONTHLY_REQUEST_LIMIT
        value: 0
      - key: AI_HISTORY_RETENTION_DAYS
        value: 30
      - key: MAINTENANCE_INTERVAL_MS
        value: 21600000
