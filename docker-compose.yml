services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_sales}
      POSTGRES_USER: ${POSTGRES_USER:-ai_sales}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Copy .env.example to .env and set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.2-alpine@sha256:223b183cbc49f5ff48728e1fc52ccf101f05072decad2bd9867281a3c9bf75fd
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  mailpit:
    image: axllent/mailpit:v1.27@sha256:e22dce5b36f93c77082e204a3942fb6b283b7896e057458400a4c88344c3df68
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 4000
      SERVE_STATIC: "true"
      TRUST_PROXY: 0
      DATABASE_URL: ${COMPOSE_DATABASE_URL:?Set COMPOSE_DATABASE_URL for the postgres service}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      DATABASE_POOL_IDLE_TIMEOUT_MS: ${DATABASE_POOL_IDLE_TIMEOUT_MS:-30000}
      DATABASE_POOL_CONNECTION_TIMEOUT_MS: ${DATABASE_POOL_CONNECTION_TIMEOUT_MS:-5000}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set a random JWT_ACCESS_SECRET of at least 32 characters}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set a different random JWT_REFRESH_SECRET of at least 32 characters}
      JWT_ISSUER: ${JWT_ISSUER:-ai-sales-platform}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ai-sales-platform-web}
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 604800
      BCRYPT_ROUNDS: 12
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4000}
      EMAIL_DELIVERY_MODE: smtp
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@example.com}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      EMAIL_VERIFICATION_TTL_MINUTES: 1440
      PASSWORD_RESET_TTL_MINUTES: 60
      RECOVERY_CODE_COUNT: 8
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:?Set a random METRICS_AUTH_TOKEN of at least 32 characters}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      AI_RATE_LIMIT_WINDOW_MS: ${AI_RATE_LIMIT_WINDOW_MS:-3600000}
      AI_RATE_LIMIT_MAX: ${AI_RATE_LIMIT_MAX:-20}
      LOG_LEVEL: info
    command: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && node server/dist/index.js"]
    ports:
      - "4000:4000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres_data:
