services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_sales
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sales"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      SERVE_STATIC: "true"
      TRUST_PROXY: 0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_sales?schema=public
      JWT_ACCESS_SECRET: local-compose-access-secret-change-before-shared-use
      JWT_REFRESH_SECRET: local-compose-refresh-secret-change-before-shared-use
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 604800
      BCRYPT_ROUNDS: 12
      CORS_ORIGINS: http://localhost:4000
      LOG_LEVEL: info
    command: ["sh", "-c", "npm run db:deploy && node server/dist/index.js"]
    ports:
      - "4000:4000"

volumes:
  postgres_data:
