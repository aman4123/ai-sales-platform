openapi: 3.1.0
info:
  title: AI Sales Platform API
  version: 2.0.0
  description: Authenticated, tenant-isolated CRM, reporting, settings, and AI workflows.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: /api
security:
  - bearerAuth: []
tags:
  - { name: Health, description: Runtime probes }
  - { name: Authentication, description: Account lifecycle and sessions }
  - { name: CRM, description: Tenant-owned sales leads }
  - { name: Reports, description: Database-aggregated sales reporting }
  - { name: Settings, description: User profile and preferences }
  - { name: AI, description: Research and email generation }
paths:
  /health/live:
    get:
      operationId: getLiveness
      tags: [Health]
      security: []
      summary: Process liveness probe
      responses:
        "200": { description: Process is alive }
        "403": { $ref: "#/components/responses/Forbidden" }
  /health/ready:
    get:
      operationId: getReadiness
      tags: [Health]
      security: []
      summary: PostgreSQL and Redis readiness probe
      responses:
        "200": { description: Dependencies are ready }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /auth/register:
    post:
      operationId: registerAccount
      tags: [Authentication]
      security: []
      summary: Create an account and send a verification link
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201": { description: Account created; verification required }
        "429": { $ref: "#/components/responses/RateLimited" }
  /auth/verification/request:
    post:
      operationId: requestEmailVerification
      tags: [Authentication]
      security: []
      summary: Request a replacement verification link
      requestBody: { $ref: "#/components/requestBodies/EmailRequest" }
      responses:
        "202": { description: Generic accepted response prevents account enumeration }
        "429": { $ref: "#/components/responses/RateLimited" }
  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [Authentication]
      security: []
      summary: Verify email and return one-time recovery codes
      requestBody: { $ref: "#/components/requestBodies/TokenRequest" }
      responses:
        "200": { description: Email verified and session established }
        "400": { $ref: "#/components/responses/BadRequest" }
  /auth/login:
    post:
      operationId: login
      tags: [Authentication]
      security: []
      summary: Sign in with a verified email and password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200": { description: Access token returned and refresh cookie set }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [Authentication]
      security: [{ refreshCookie: [] }]
      summary: Atomically rotate a refresh session
      responses:
        "200": { description: New access token and refresh cookie returned }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/logout:
    post:
      operationId: logout
      tags: [Authentication]
      security: [{ refreshCookie: [] }]
      summary: Revoke the current refresh session
      responses:
        "204": { description: Session revoked or already absent }
        "429": { $ref: "#/components/responses/RateLimited" }
  /auth/password-reset/request:
    post:
      operationId: requestPasswordReset
      tags: [Authentication]
      security: []
      summary: Request a one-time password reset link
      requestBody: { $ref: "#/components/requestBodies/EmailRequest" }
      responses:
        "202": { description: Generic accepted response prevents account enumeration }
        "429": { $ref: "#/components/responses/RateLimited" }
  /auth/password-reset/confirm:
    post:
      operationId: confirmPasswordReset
      tags: [Authentication]
      security: []
      summary: Change password and revoke all sessions
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordRequest" }
      responses:
        "204": { description: Password changed and sessions revoked }
        "400": { $ref: "#/components/responses/BadRequest" }
  /auth/recover:
    post:
      operationId: recoverAccount
      tags: [Authentication]
      security: []
      summary: Recover an account with a one-time backup code
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecoveryRequest" }
      responses:
        "204": { description: "Password changed, code consumed, and sessions revoked" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/recovery-codes:
    post:
      operationId: replaceRecoveryCodes
      tags: [Authentication]
      summary: Replace recovery codes after password confirmation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [password]
              properties: { password: { type: string, format: password, maxLength: 128 } }
      responses:
        "200": { description: New one-time recovery codes returned }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [Authentication]
      summary: Return the current user and settings
      responses:
        "200": { description: Current account }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /leads:
    get:
      operationId: listLeads
      tags: [CRM]
      summary: List a cursor-paginated tenant lead page
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string, maxLength: 200 } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/LeadStatus" } }
      responses:
        "200": { description: Lead page }
        "400": { $ref: "#/components/responses/BadRequest" }
    post:
      operationId: createLead
      tags: [CRM]
      summary: Create a tenant-owned lead
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeadInput" }
      responses:
        "201": { description: Lead created }
        "400": { $ref: "#/components/responses/BadRequest" }
  /leads/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    put:
      operationId: updateLead
      tags: [CRM]
      summary: Update a tenant-owned lead
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeadInput" }
      responses:
        "200": { description: Lead updated }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteLead
      tags: [CRM]
      summary: Delete a tenant-owned lead
      responses:
        "204": { description: Lead deleted }
        "404": { $ref: "#/components/responses/NotFound" }
  /reports/summary:
    get:
      operationId: getReportSummary
      tags: [Reports]
      summary: Return database-aggregated tenant reporting
      responses:
        "200": { description: "Summary, monthly counts, and status distribution" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /settings:
    get:
      operationId: getSettings
      tags: [Settings]
      summary: Read user settings
      responses:
        "200": { description: Settings returned }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: updateSettings
      tags: [Settings]
      summary: Update profile and preferences
      responses:
        "200": { description: Settings updated }
        "409": { $ref: "#/components/responses/Conflict" }
  /ai/demo:
    post:
      operationId: runAiDemo
      tags: [AI]
      security: []
      summary: Run the public, rate-limited mock demonstration
      responses:
        "200": { description: Mock result }
        "429": { $ref: "#/components/responses/RateLimited" }
  /ai/research:
    post:
      operationId: createAiResearch
      tags: [AI]
      summary: Generate and retain an authenticated research result
      responses:
        "200": { description: AI research result }
        "429": { $ref: "#/components/responses/RateLimited" }
        "502": { $ref: "#/components/responses/BadGateway" }
  /ai/email:
    post:
      operationId: createAiEmail
      tags: [AI]
      summary: Generate and retain an authenticated sales email
      responses:
        "200": { description: AI email result }
        "429": { $ref: "#/components/responses/RateLimited" }
        "502": { $ref: "#/components/responses/BadGateway" }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    refreshCookie: { type: apiKey, in: cookie, name: refresh_token }
  schemas:
    Password: { type: string, format: password, minLength: 12, maxLength: 128 }
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [name, email, password]
      properties:
        name: { type: string, minLength: 2, maxLength: 100 }
        email: { type: string, format: email, maxLength: 254 }
        password: { $ref: "#/components/schemas/Password" }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, format: password, maxLength: 128 }
    TokenRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties: { token: { type: string, minLength: 32, maxLength: 256 } }
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [token, password]
      properties:
        token: { type: string, minLength: 32, maxLength: 256 }
        password: { $ref: "#/components/schemas/Password" }
    RecoveryRequest:
      type: object
      additionalProperties: false
      required: [email, recoveryCode, password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        recoveryCode: { type: string, minLength: 20, maxLength: 32 }
        password: { $ref: "#/components/schemas/Password" }
    LeadStatus:
      type: string
      enum: [INTERESTED, MEETING, FOLLOW_UP, PROPOSAL_SENT, CLOSED, LOST]
    LeadInput:
      type: object
      properties:
        company: { type: string, maxLength: 160 }
        contact: { type: string, maxLength: 160 }
        email: { type: [string, "null"], format: email, maxLength: 254 }
        phone: { type: [string, "null"], maxLength: 50 }
        industry: { type: [string, "null"], maxLength: 120 }
        status: { $ref: "#/components/schemas/LeadStatus" }
        value: { type: number, minimum: 0, maximum: 9999999999999.99 }
        notes: { type: [string, "null"], maxLength: 10000 }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
  requestBodies:
    EmailRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required: [email]
            properties: { email: { type: string, format: email, maxLength: 254 } }
    TokenRequest:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/TokenRequest" }
  responses:
    BadRequest: { description: Validation or token failure, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Unauthorized: { description: Authentication failed, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Forbidden: { description: Operation is not permitted, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    NotFound: { description: Resource missing or belongs to another tenant, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    Conflict: { description: Resource state conflict, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    RateLimited: { description: Request rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    BadGateway: { description: AI provider response failure, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    ServiceUnavailable: { description: Required dependency unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
