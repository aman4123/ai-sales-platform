global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ai-sales-platform
    metrics_path: /api/metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/ai_sales_metrics_token
    static_configs:
      - targets: ["ai-sales-platform.example.com"]
