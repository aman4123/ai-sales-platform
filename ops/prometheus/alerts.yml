groups:
  - name: ai-sales-platform
    rules:
      - alert: AiSalesHighErrorRate
        expr: sum(rate(ai_sales_http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(ai_sales_http_requests_total[5m])), 0.001) > 0.02
        for: 10m
        labels:
          severity: page
        annotations:
          summary: AI Sales Platform 5xx error rate exceeds 2%
      - alert: AiSalesHighLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(ai_sales_http_request_duration_seconds_bucket[10m]))) > 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: AI Sales Platform p95 latency exceeds one second
      - alert: AiSalesNoTraffic
        expr: absent(ai_sales_process_start_time_seconds)
        for: 5m
        labels:
          severity: page
        annotations:
          summary: AI Sales Platform metrics target is unavailable
      - alert: AiSalesRateLimitSpike
        expr: sum(rate(ai_sales_rate_limit_rejections_total[10m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: AI Sales Platform is rejecting more than one request per second
